<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Notifier</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --y: #F5C518;
            --yb: rgba(245, 197, 24, 0.25);
            --bg: #080807;
        }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(245, 197, 24, 0.055) 1px, transparent 1px),
                linear-gradient(90deg, rgba(245, 197, 24, 0.055) 1px, transparent 1px);
            background-size: 48px 48px;
            z-index: 0;
        }

        .grid-fade {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 30%, var(--bg) 85%);
            z-index: 0;
        }

        .glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(245, 197, 24, 0.06) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            border: 1px solid var(--yb);
            border-radius: 3px;
            padding: 56px 52px 48px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            background: rgba(8, 8, 7, 0.7);
            backdrop-filter: blur(2px);
        }

        .container::before,
        .container::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: var(--y);
            border-style: solid;
        }
        .container::before {
            top: -1px; left: -1px;
            border-width: 2px 0 0 2px;
        }
        .container::after {
            bottom: -1px; right: -1px;
            border-width: 0 2px 2px 0;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px;
            color: var(--y);
            letter-spacing: 10px;
            line-height: 1;
            margin-bottom: 6px;
            text-shadow: 0 0 60px rgba(245, 197, 24, 0.3);
        }

        .tagline {
            font-size: 9px;
            color: rgba(245, 197, 24, 0.4);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 52px;
        }

        .connecting-text {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            background: var(--y);
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
            animation: blink 1.2s ease-in-out infinite;
            box-shadow: 0 0 8px var(--y);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .progress-wrap {
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin-bottom: 44px;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            background: var(--y);
            box-shadow: 0 0 10px var(--y);
            animation: fill 0.15s ease-out forwards;
        }

        @keyframes fill {
            from { width: 0% }
            to { width: 100% }
        }

        /* ========== MELHORIAS ========== */

        /* Badge do Job ID */
        .job-badge {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--y);
            background: rgba(245, 197, 24, 0.08);
            border: 1px solid rgba(245, 197, 24, 0.2);
            padding: 8px 12px;
            margin: -20px 0 30px 0;
            display: inline-block;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .job-badge span {
            color: rgba(255,255,255,0.5);
            margin-right: 6px;
        }

        /* Input field */
        .input-group {
            margin: 30px 0 20px;
            position: relative;
        }

        .job-input {
            width: 100%;
            background: transparent;
            border: 1px solid rgba(245, 197, 24, 0.2);
            padding: 16px 20px;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            transition: all 0.2s;
        }

        .job-input:focus {
            outline: none;
            border-color: var(--y);
            box-shadow: 0 0 15px rgba(245, 197, 24, 0.2);
        }

        .job-input::placeholder {
            color: rgba(255,255,255,0.15);
            letter-spacing: 3px;
        }

        /* Botão JOIN */
        .join-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--y);
            padding: 16px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--y);
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .join-btn:hover {
            background: rgba(245, 197, 24, 0.1);
            box-shadow: 0 0 20px rgba(245, 197, 24, 0.2);
        }

        .join-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Loading indicator */
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin: 20px 0;
            font-size: 10px;
            color: var(--y);
            letter-spacing: 2px;
        }

        .loading.show {
            display: flex;
        }

        .loading-dot {
            width: 4px;
            height: 4px;
            background: var(--y);
            border-radius: 50%;
            animation: loadPulse 1.4s infinite;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes loadPulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* Status bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 35px;
            padding: 15px 0 0;
            border-top: 1px solid rgba(245, 197, 24, 0.1);
            font-size: 8px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.2);
        }

        .status-item.active {
            color: var(--y);
        }

        /* Mensagem de auto launch */
        .auto-message {
            font-size: 8px;
            color: rgba(245, 197, 24, 0.3);
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
            animation: fade 2s infinite;
        }

        @keyframes fade {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .countdown {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 96px;
            color: var(--y);
            line-height: 1;
            text-shadow: 0 0 60px rgba(245, 197, 24, 0.5);
            margin: -10px 0 -20px;
        }

        .fallback-note {
            font-size: 7px;
            color: rgba(255,255,255,0.1);
            margin-top: 20px;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            .container { padding: 40px 28px 36px; }
            .logo { font-size: 42px; }
            .countdown { font-size: 76px; }
            .join-btn { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="grid-fade"></div>
    <div class="glow"></div>

    <div class="container">
        <div class="logo">ZENITH</div>
        <div class="connecting-text"><span class="dot"></span>Conectando ao servidor</div>
        
        <div class="progress-wrap">
            <div class="progress-fill"></div>
        </div>

        <!-- MELHORIAS ADICIONADAS -->
        
        <!-- Badge que mostra se veio da URL -->
        <div class="job-badge" id="jobBadge">
            <span>⚡</span> JOB ID: <span id="jobIdDisplay">aguardando</span>
        </div>

        <!-- Input para digitar Job ID manualmente -->
        <div class="input-group">
            <input type="text" class="job-input" id="jobInput" placeholder="DIGITAR JOB ID">
        </div>

        <!-- Botão JOIN -->
        <button class="join-btn" id="joinBtn">JOIN</button>

        <!-- Loading indicator -->
        <div class="loading" id="loading">
            <span>CONECTANDO</span>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>

        <!-- Mensagem de auto launch -->
        <div class="auto-message" id="autoMessage"></div>

        <!-- Status bar -->
        <div class="status-bar">
            <div class="status-item active" id="statusOnline">● ONLINE</div>
            <div class="status-item" id="statusProxy">⚡ PROXY</div>
            <div class="status-item" id="statusServer">🔷 BR-01</div>
        </div>

        <div class="fallback-note">© ZENITH NOTIFIER • FAST CONNECTION</div>
    </div>

    <script>
        // Configurações
        const FIXED_PLACE_ID = '109983668079237';
        
        // Elementos DOM
        const jobInput = document.getElementById('jobInput');
        const joinBtn = document.getElementById('joinBtn');
        const loading = document.getElementById('loading');
        const jobBadge = document.getElementById('jobBadge');
        const jobIdDisplay = document.getElementById('jobIdDisplay');
        const autoMessage = document.getElementById('autoMessage');
        const statusOnline = document.getElementById('statusOnline');
        const statusProxy = document.getElementById('statusProxy');
        const statusServer = document.getElementById('statusServer');

        // Função para salvar no Firebase
        async function saveToFirebase(jobId) {
            const data = {
                placeId: FIXED_PLACE_ID,
                gameInstanceId: jobId,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                platform: navigator.platform
            };
            
            try {
                const response = await fetch('https://api-join-default-rtdb.firebaseio.com/connections.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) console.log('✅ Firebase saved');
            } catch (error) {
                console.log('⚠️ Firebase error');
            }
        }

        // Função para abrir o Roblox APP
        function launchRoblox(jobId) {
            // Mostra loading
            loading.classList.add('show');
            joinBtn.disabled = true;
            jobInput.disabled = true;
            
            // Atualiza status
            statusOnline.innerHTML = '● CONECTANDO';
            statusProxy.innerHTML = '⚡ ATIVO';
            statusServer.innerHTML = '🔷 BR-01';

            // Salva no Firebase
            saveToFirebase(jobId);

            // Monta URL do Roblox (APP)
            const robloxUrl = `roblox://placeId=${FIXED_PLACE_ID}&gameInstanceId=${jobId}`;
            
            console.log('🚀 Launching Roblox App:', robloxUrl);
            
            // Tenta abrir o app
            window.location.href = robloxUrl;

            // Fallback apenas se não tiver app instalado
            setTimeout(() => {
                if (document.hasFocus()) {
                    // Se ainda está na página, app não abriu
                    loading.innerHTML = '<span style="color: #F5C518;">⚠️ ROBLOX APP NÃO ENCONTRADO</span>';
                    setTimeout(() => {
                        loading.classList.remove('show');
                        joinBtn.disabled = false;
                        jobInput.disabled = false;
                        statusOnline.innerHTML = '● ONLINE';
                    }, 2000);
                }
            }, 1500);
        }

        // Pega parâmetros da URL
        const urlParams = new URLSearchParams(window.location.search);
        const urlJobId = urlParams.get('gameInstanceId');
        const urlPlaceId = urlParams.get('placeId');

        // Se tiver Job ID na URL
        if (urlJobId && urlJobId !== 'JOB_ID_REAL' && urlJobId.length > 3) {
            // Mostra no badge
            jobIdDisplay.textContent = urlJobId;
            jobBadge.style.display = 'inline-block';
            
            // Coloca no input
            jobInput.value = urlJobId;
            
            // Mostra mensagem de auto launch
            autoMessage.textContent = '⚡ AUTO LAUNCH EM 1 SEGUNDO ⚡';
            
            // Auto launch após 1 segundo
            setTimeout(() => {
                launchRoblox(urlJobId);
            }, 1000);
        } else {
            // Esconde badge se não tiver Job ID
            jobBadge.style.display = 'none';
            autoMessage.textContent = 'DIGITE UM JOB ID PARA ENTRAR';
        }

        // Evento do botão JOIN
        joinBtn.addEventListener('click', () => {
            const jobId = jobInput.value.trim();
            if (!jobId) {
                alert('⚠️ DIGITE UM JOB ID');
                return;
            }
            launchRoblox(jobId);
        });

        // Evento Enter no input
        jobInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const jobId = jobInput.value.trim();
                if (!jobId) {
                    alert('⚠️ DIGITE UM JOB ID');
                    return;
                }
                launchRoblox(jobId);
            }
        });

        // Verifica se placeId está correto
        if (urlPlaceId && urlPlaceId !== FIXED_PLACE_ID) {
            console.log('Place ID diferente detectado');
        }
    </script>
</body>
</html>
